name: WikiWire
description: Sync your Git repositories with your live on-wiki MediaWiki modules and templates
branding:
  icon: upload-cloud
  color: blue

inputs:
  username:
    description: Default bot username for all sites (Special:BotPasswords recommended with User@BotUser). Optional if every site that needs sync has an entry in site_credentials.
    required: false
    default: ""
  password:
    description: Default bot password for all sites. Optional if every site that needs sync has an entry in site_credentials.
    required: false
    default: ""
  site_credentials:
    description: Optional JSON object mapping wikiwire.toml site id to {"username":"...","password":"..."} for per-wiki credentials in one workflow
    required: false
    default: ""
  config_path:
    description: Path to wikiwire.toml relative to the repository root
    required: false
    default: wikiwire.toml
  ignore_path:
    description: Path to .wikiwireignore relative to the repository root (optional file)
    required: false
    default: .wikiwireignore
  dry_run:
    description: If true, log edits only and do not call the MediaWiki API
    required: false
    default: "false"
  sync_all:
    description: NOT RECOMMENDED FOR MOST USE-CASES! If true ("override"), sync all files under modules/ and templates/ from the workspace instead of commit diffs (use for workflow_dispatch or full sync)
    required: false
    default: "false"

runs:
  using: node20
  main: dist/index.js
